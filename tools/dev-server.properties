# Canonical dev-server settings for Eidolon Drift in-game testing.
# Copied into run/server.properties by tools/rcon.py (or manually) before `gradlew runServer`.
# Minecraft merges this with its defaults on first boot, keeping these values.
#
# RCON lets the agent/CI drive /eidolon commands against a live world headlessly.
enable-rcon=true
rcon.password=eidolon_drift
rcon.port=25575
broadcast-rcon-to-ops=false

# Dev conveniences (not for production).
online-mode=false
white-list=false
spawn-protection=0
difficulty=normal
gamemode=survival
allow-nether=true
max-tick-time=-1
motd=Eidolon Drift dev server
